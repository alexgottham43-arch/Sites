<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiM TeCH — Панель управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin { padding: 2rem 0; min-height: 100vh; }
        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .admin-header h1 { font-family: var(--font-display); font-size: 1.8rem; }
        .admin-header h1 span { color: var(--primary-light); }
        .admin-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .admin-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .admin-stat {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem;
        }
        .admin-stat-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .admin-stat-value {
            font-family: var(--font-display); font-size: 1.8rem; font-weight: 700;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .admin-toolbar {
            display: flex; gap: 0.75rem; margin-bottom: 1.5rem;
            flex-wrap: wrap; align-items: center;
        }
        .admin-search {
            flex: 1; min-width: 200px;
            padding: 0.6rem 1rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 0.85rem; outline: none;
        }
        .admin-search:focus { border-color: var(--primary); }
        .admin-table-wrap { overflow-x: auto; margin-bottom: 2rem; }
        .admin-table {
            width: 100%; border-collapse: collapse;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 0.75rem 1rem; text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .admin-table th {
            background: var(--bg-surface); color: var(--text-muted);
            font-weight: 600; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background: rgba(108, 92, 231, 0.03); }
        .admin-product-name { display: flex; align-items: center; gap: 0.75rem; }
        .admin-product-icon {
            width: 40px; height: 40px;
            background: var(--bg-surface); border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .admin-product-info h4 { font-size: 0.85rem; margin-bottom: 0.15rem; }
        .admin-product-info p { font-size: 0.7rem; color: var(--text-muted); }
        .stock-select {
            padding: 0.3rem 0.6rem;
            border-radius: 50px; border: none;
            font-size: 0.75rem; font-weight: 600;
            cursor: pointer; outline: none;
        }
        .stock-select.stock-in { background: rgba(0,230,118,0.15); color: var(--success); }
        .stock-select.stock-out { background: rgba(255,82,82,0.15); color: var(--danger); }
        .stock-select.stock-order { background: rgba(255,179,0,0.15); color: var(--warning); }
        .stock-select option { background: var(--bg-card); color: var(--text); }
        .admin-btn-group { display: flex; gap: 0.4rem; }
        .admin-icon-btn {
            width: 32px; height: 32px;
            background: var(--bg-surface); border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 0.85rem;
        }
        .admin-icon-btn:hover { background: var(--primary); color: #fff; }
        .admin-icon-btn.delete:hover { background: var(--danger); }

        /* Modal form */
        .form-overlay {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(15,15,26,0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .form-overlay.active { opacity: 1; visibility: visible; }
        .form-modal {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 2rem;
            max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto;
        }
        .form-modal h2 { font-family: var(--font-display); margin-bottom: 1.5rem; font-size: 1.3rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.6rem 1rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 0.85rem; outline: none;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

        /* Specs editor */
        .specs-list { margin-top: 0.5rem; }
        .spec-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
        .spec-row input { flex: 1; }
        .spec-remove { color: var(--danger); font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
        .add-spec-btn { font-size: 0.8rem; color: var(--primary-light); cursor: pointer; margin-top: 0.25rem; }

        @media (max-width: 768px) {
            .admin-table th:nth-child(4), .admin-table td:nth-child(4) { display: none; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Admin Header -->
    <header class="header" style="position: relative;">
        <div class="container" style="padding-top: 0.5rem; padding-bottom: 0.5rem;">
            <a href="index.html" class="logo">TiM <span>TeCH</span></a>
            <div style="font-size:0.85rem; color: var(--text-muted);">Панель управления</div>
        </div>
    </header>

    <section class="admin">
        <div class="container">
            <div class="admin-header">
                <h1>Управление <span>товарами</span></h1>
                <div class="admin-actions">
                    <button class="btn btn-primary" id="addProductBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Добавить товар
                    </button>
                    <button class="btn btn-outline" id="resetBtn">Сбросить к начальным</button>
                    <a href="index.html" class="btn btn-outline">На сайт</a>
                </div>
            </div>

            <div class="admin-stats" id="adminStats"></div>

            <div class="admin-toolbar">
                <input type="text" class="admin-search" id="adminSearch" placeholder="Поиск по названию...">
                <select id="adminCatFilter" class="sort-select">
                    <option value="all">Все категории</option>
                </select>
                <select id="adminStockFilter" class="sort-select">
                    <option value="all">Все статусы</option>
                    <option value="in">В наличии</option>
                    <option value="out">Нет в наличии</option>
                    <option value="order">Под заказ</option>
                </select>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Товар</th>
                            <th>Категория</th>
                            <th>Цена</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Product Form Modal -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-modal">
            <h2 id="formTitle">Добавить товар</h2>
            <form id="productForm">
                <input type="hidden" id="formId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Название *</label>
                        <input type="text" id="formName" required>
                    </div>
                    <div class="form-group">
                        <label>Категория *</label>
                        <select id="formCategory" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Цена (сум) *</label>
                        <input type="number" id="formPrice" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Старая цена (сум)</label>
                        <input type="number" id="formOldPrice" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Наличие</label>
                        <select id="formStock">
                            <option value="in">В наличии</option>
                            <option value="out">Нет в наличии</option>
                            <option value="order">Под заказ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Бейдж</label>
                        <select id="formBadge">
                            <option value="">Нет</option>
                            <option value="new">NEW</option>
                            <option value="hot">HIT</option>
                            <option value="sale">SALE</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Иконка (emoji)</label>
                        <input type="text" id="formIcon" maxlength="4" placeholder="📱">
                    </div>
                    <div class="form-group"></div>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="formDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Характеристики</label>
                    <div class="specs-list" id="specsEditor"></div>
                    <div class="add-spec-btn" id="addSpecBtn">+ Добавить характеристику</div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" class="btn btn-outline" id="formCancel">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        var CATEGORIES = [
            { id: 'smartphones', name: 'Смартфоны', icon: '📱' },
            { id: 'accessories', name: 'Аксессуары', icon: '🎒' },
            { id: 'peripherals', name: 'Периферия', icon: '🖱️' },
            { id: 'audio', name: 'Аудио', icon: '🎧' },
            { id: 'charging', name: 'Зарядки', icon: '⚡' },
            { id: 'smart', name: 'Умные устройства', icon: '⌚' }
        ];

        var DEFAULT_PRODUCTS = [];

        /* Load default products from main script */
        function loadDefaults() {
            if (window.TimTech) {
                DEFAULT_PRODUCTS = window.TimTech.DEFAULT_PRODUCTS;
            }
        }

        var products = [];
        var searchQuery = '';
        var catFilter = 'all';
        var stockFilterVal = 'all';

        function loadProducts() {
            var stored = localStorage.getItem('timtech_products');
            if (stored) { try { products = JSON.parse(stored); } catch(e) { products = []; } }
            if (!products.length && DEFAULT_PRODUCTS.length) {
                products = DEFAULT_PRODUCTS.slice();
                saveProducts();
            }
        }

        function saveProducts() {
            localStorage.setItem('timtech_products', JSON.stringify(products));
        }

        function formatPrice(n) {
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' сум';
        }

        function catName(id) {
            var c = CATEGORIES.find(function(x) { return x.id === id; });
            return c ? c.name : id;
        }

        function stockClass(s) {
            return s === 'in' ? 'stock-in' : s === 'out' ? 'stock-out' : 'stock-order';
        }

        function renderStats() {
            var el = document.getElementById('adminStats');
            var total = products.length;
            var inStock = products.filter(function(p) { return p.stock === 'in'; }).length;
            var outStock = products.filter(function(p) { return p.stock === 'out'; }).length;
            var orderStock = products.filter(function(p) { return p.stock === 'order'; }).length;
            el.innerHTML =
                '<div class="admin-stat"><div class="admin-stat-label">Всего товаров</div><div class="admin-stat-value">' + total + '</div></div>' +
                '<div class="admin-stat"><div class="admin-stat-label">В наличии</div><div class="admin-stat-value" style="-webkit-text-fill-color: var(--success);">' + inStock + '</div></div>' +
                '<div class="admin-stat"><div class="admin-stat-label">Нет в наличии</div><div class="admin-stat-value" style="-webkit-text-fill-color: var(--danger);">' + outStock + '</div></div>' +
                '<div class="admin-stat"><div class="admin-stat-label">Под заказ</div><div class="admin-stat-value" style="-webkit-text-fill-color: var(--warning);">' + orderStock + '</div></div>';
        }

        function getFiltered() {
            return products.filter(function(p) {
                if (catFilter !== 'all' && p.category !== catFilter) return false;
                if (stockFilterVal !== 'all' && p.stock !== stockFilterVal) return false;
                if (searchQuery && p.name.toLowerCase().indexOf(searchQuery) === -1) return false;
                return true;
            });
        }

        function renderTable() {
            var tbody = document.getElementById('adminTableBody');
            var filtered = getFiltered();
            tbody.innerHTML = filtered.map(function(p) {
                return '<tr>' +
                    '<td><div class="admin-product-name"><div class="admin-product-icon">' + (p.icon || '📦') + '</div>' +
                    '<div class="admin-product-info"><h4>' + p.name + '</h4><p>ID: ' + p.id + '</p></div></div></td>' +
                    '<td>' + catName(p.category) + '</td>' +
                    '<td>' + formatPrice(p.price) + '</td>' +
                    '<td><select class="stock-select ' + stockClass(p.stock) + '" data-id="' + p.id + '">' +
                    '<option value="in"' + (p.stock === 'in' ? ' selected' : '') + '>В наличии</option>' +
                    '<option value="out"' + (p.stock === 'out' ? ' selected' : '') + '>Нет в наличии</option>' +
                    '<option value="order"' + (p.stock === 'order' ? ' selected' : '') + '>Под заказ</option>' +
                    '</select></td>' +
                    '<td><div class="admin-btn-group">' +
                    '<button class="admin-icon-btn" data-action="edit" data-id="' + p.id + '" title="Редактировать">&#9998;</button>' +
                    '<button class="admin-icon-btn delete" data-action="delete" data-id="' + p.id + '" title="Удалить">&#10005;</button>' +
                    '</div></td></tr>';
            }).join('') || '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">Нет товаров</td></tr>';

            /* Stock change */
            tbody.querySelectorAll('.stock-select').forEach(function(sel) {
                sel.addEventListener('change', function() {
                    var id = parseInt(this.dataset.id, 10);
                    var p = products.find(function(x) { return x.id === id; });
                    if (p) {
                        p.stock = this.value;
                        this.className = 'stock-select ' + stockClass(p.stock);
                        saveProducts();
                        renderStats();
                    }
                });
            });

            /* Edit / Delete */
            tbody.querySelectorAll('.admin-icon-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = parseInt(this.dataset.id, 10);
                    if (this.dataset.action === 'edit') openForm(id);
                    else if (this.dataset.action === 'delete') {
                        if (confirm('Удалить этот товар?')) {
                            products = products.filter(function(p) { return p.id !== id; });
                            saveProducts();
                            renderAll();
                        }
                    }
                });
            });
        }

        /* Category filter dropdown */
        function initCatDropdown() {
            var sel = document.getElementById('adminCatFilter');
            sel.innerHTML = '<option value="all">Все категории</option>' +
                CATEGORIES.map(function(c) { return '<option value="' + c.id + '">' + c.icon + ' ' + c.name + '</option>'; }).join('');
        }

        /* Form category dropdown */
        function initFormCatDropdown() {
            var sel = document.getElementById('formCategory');
            sel.innerHTML = CATEGORIES.map(function(c) { return '<option value="' + c.id + '">' + c.icon + ' ' + c.name + '</option>'; }).join('');
        }

        /* Form */
        var editingId = null;
        var specRows = [];

        function openForm(id) {
            var overlay = document.getElementById('formOverlay');
            if (id) {
                editingId = id;
                document.getElementById('formTitle').textContent = 'Редактировать товар';
                var p = products.find(function(x) { return x.id === id; });
                if (!p) return;
                document.getElementById('formId').value = p.id;
                document.getElementById('formName').value = p.name;
                document.getElementById('formCategory').value = p.category;
                document.getElementById('formPrice').value = p.price;
                document.getElementById('formOldPrice').value = p.oldPrice || '';
                document.getElementById('formStock').value = p.stock;
                document.getElementById('formBadge').value = p.badge || '';
                document.getElementById('formIcon').value = p.icon || '';
                document.getElementById('formDescription').value = p.description || '';
                specRows = p.specs ? Object.keys(p.specs).map(function(k) { return { key: k, val: p.specs[k] }; }) : [];
            } else {
                editingId = null;
                document.getElementById('formTitle').textContent = 'Добавить товар';
                document.getElementById('productForm').reset();
                document.getElementById('formId').value = '';
                specRows = [];
            }
            renderSpecs();
            overlay.classList.add('active');
        }

        function closeForm() {
            document.getElementById('formOverlay').classList.remove('active');
        }

        function renderSpecs() {
            var container = document.getElementById('specsEditor');
            container.innerHTML = specRows.map(function(s, i) {
                return '<div class="spec-row">' +
                    '<input type="text" placeholder="Название" value="' + (s.key || '') + '" data-idx="' + i + '" data-field="key">' +
                    '<input type="text" placeholder="Значение" value="' + (s.val || '') + '" data-idx="' + i + '" data-field="val">' +
                    '<span class="spec-remove" data-idx="' + i + '">&times;</span></div>';
            }).join('');

            container.querySelectorAll('input').forEach(function(inp) {
                inp.addEventListener('input', function() {
                    var idx = parseInt(this.dataset.idx, 10);
                    specRows[idx][this.dataset.field] = this.value;
                });
            });

            container.querySelectorAll('.spec-remove').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    specRows.splice(parseInt(this.dataset.idx, 10), 1);
                    renderSpecs();
                });
            });
        }

        function saveForm() {
            var name = document.getElementById('formName').value.trim();
            var category = document.getElementById('formCategory').value;
            var price = parseInt(document.getElementById('formPrice').value, 10);
            var oldPrice = parseInt(document.getElementById('formOldPrice').value, 10) || null;
            var stock = document.getElementById('formStock').value;
            var badge = document.getElementById('formBadge').value || null;
            var icon = document.getElementById('formIcon').value || '📦';
            var description = document.getElementById('formDescription').value.trim();

            if (!name || !price) return;

            var specs = {};
            specRows.forEach(function(s) { if (s.key && s.val) specs[s.key] = s.val; });

            if (editingId) {
                var p = products.find(function(x) { return x.id === editingId; });
                if (p) {
                    p.name = name; p.category = category; p.price = price;
                    p.oldPrice = oldPrice; p.stock = stock; p.badge = badge;
                    p.icon = icon; p.description = description; p.specs = specs;
                }
            } else {
                var maxId = products.reduce(function(m, p) { return Math.max(m, p.id); }, 0);
                products.push({
                    id: maxId + 1, name: name, category: category,
                    price: price, oldPrice: oldPrice, icon: icon,
                    stock: stock, badge: badge, description: description, specs: specs
                });
            }

            saveProducts();
            closeForm();
            renderAll();
        }

        function renderAll() {
            renderStats();
            renderTable();
        }

        /* Init */
        function init() {
            loadDefaults();
            loadProducts();
            initCatDropdown();
            initFormCatDropdown();
            renderAll();

            document.getElementById('addProductBtn').addEventListener('click', function() { openForm(null); });
            document.getElementById('formCancel').addEventListener('click', closeForm);
            document.getElementById('formOverlay').addEventListener('click', function(e) { if (e.target === this) closeForm(); });
            document.getElementById('productForm').addEventListener('submit', function(e) { e.preventDefault(); saveForm(); });

            document.getElementById('addSpecBtn').addEventListener('click', function() {
                specRows.push({ key: '', val: '' });
                renderSpecs();
            });

            document.getElementById('adminSearch').addEventListener('input', function() {
                searchQuery = this.value.toLowerCase().trim();
                renderTable();
            });

            document.getElementById('adminCatFilter').addEventListener('change', function() {
                catFilter = this.value;
                renderTable();
            });

            document.getElementById('adminStockFilter').addEventListener('change', function() {
                stockFilterVal = this.value;
                renderTable();
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('Сбросить все товары к начальным? Ваши изменения будут потеряны.')) {
                    localStorage.removeItem('timtech_products');
                    loadDefaults();
                    products = DEFAULT_PRODUCTS.slice();
                    saveProducts();
                    renderAll();
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
    <script src="script.js"></script>
</body>
</html>
